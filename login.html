<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreOrder Tracker — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="login-body">

  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card glass">

      <div class="login-brand">
        <div class="brand-icon">
          <i class="fa-solid fa-box-open"></i>
        </div>
        <h1 class="brand-name">PreTrack</h1>
        <p class="brand-tagline">Preorder Management System</p>
      </div>

      <form class="login-form" id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="username">
            <i class="fa-solid fa-user"></i> Username
          </label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter password" />
            <button type="button" class="toggle-pw" id="togglePw">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-hint">
          <i class="fa-solid fa-circle-info"></i>
          Demo: <strong>admin</strong> / <strong>admin123</strong>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span>Sign In</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="login-error hidden" id="loginError">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="errorMsg">Invalid credentials</span>
        </div>
      </form>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
